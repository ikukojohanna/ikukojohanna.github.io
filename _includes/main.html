<!DOCTYPE html>

<html lang="en">
    <head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Johanna Odersky</title>
	<style>
	 a {
	     color: #000000;
	     text-decoration: none;
	 }
	 a:hover {
	     text-decoration: underline;
	 }
	 header {
	     margin-top: 3em;
	 }
	 nav, main {
	     margin-top: 4em;
	 }
	 nav ul {
	     margin-bottom: 2em;
	     list-style: none;
	 }
	 h1, h2, h3, h4, h5, h6 {
	     font-size: medium;
	     font-weight: normal;
	 }
	 .work {
	     margin-top: 3em;
	 }
	 .work > img {
	     display: block;
	     margin-left: auto;
	     margin-right: auto;
	     margin-bottom: 5em;
	     max-width: 60%;
	 }
	</style>
    </head>
    <body>
	<header style="text-align: center;">
	    <h1 id="title">Johanna Odersky</h1>
	    <p>Lives and works in Frankfurt am Main, Germany</p>
	    <p>johanna.odersky@gmail.com</p>
	</header>
	<nav>
	    <ul>
		{% for work in site.works %}
		<li><a href="/works#{{work.title}}">{{work.title}}</a></li>
		{% endfor %}
	    </ul>
	    <span>Iku</span>
	    <ul>
		<li><a href="https://genot.bandcamp.com/album/fugue-some-temporal-patterns-other-than-the-forward-march">Fugue: Some Temporal Patterns Other Than the Forward March</a></li>
		<li><a href="https://soundcloud.com/ikukojohanna">SoundCloud</a></li>
	    </ul>
	</nav>
	<main>
	    {{ content }}
	</main>
    </body
</html>
